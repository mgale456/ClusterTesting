apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: trek
  namespace: trek
spec:
  parentRefs:
    - name: envoy-internal
      namespace: envoy
      sectionName: https
  hostnames:
    - "trek.${INGRESS_URL}"
  rules:
    - backendRefs:
        - name: trek-app-template
          port: 3000

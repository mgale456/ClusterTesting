apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: homepage
spec:
  parentRefs:
    - name: envoy-internal
      namespace: envoy
      sectionName: https
  hostnames:
    - "homepage.${INGRESS_URL}"
  rules:
    - backendRefs:
        - name: homepage
          port: 10352

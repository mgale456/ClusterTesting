---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage-external
  namespace: homepage-external
spec:
  interval: 15m
  chart:
    spec:
      chart: homepage
      version: 11.23.2
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: ${TZ}
    podOptions:
      hostUsers: true
    persistence:
      config:
        type: emptyDir
    workload:
      main:
        podSpec:
          automountServiceAccountToken: true
          containers:
            main:
              env:
                # Set this to your host (example: home.mydomain.com)
                HOMEPAGE_ALLOWED_HOSTS: "${INGRESS_URL}"
          initContainers:
            init-config:
              enabled: false
    configmap:
      config:
        enabled: true
        data:
          custom.js: ""
          custom.css: ""
          kubernetes.yaml: |
            mode: cluster
            ingress: true
            gateway: true
          settings.yaml: |
            ---
            # For configuration options and examples, please see:
            # https://gethomepage.dev/latest/configs/settings

            instanceName: external

            providers:
              openweathermap: openweathermapapikey
              weatherapi: weatherapiapikey

            useEqualHeights: true

            layout:
              - Home Automation:
                  icon: mdi-home
                  style: row
                  columns: 3
              - Tools:
                  icon: mdi-tools
              - Finance:
                  icon: mdi-cash-multiple
                  #style: row
                  #columns: 3
              - Default:
                  style: row
                  columns: 3
          widgets.yaml: |
            ---
            # For configuration options and examples, please see:
            # https://gethomepage.dev/latest/configs/widgets

            - resources:
                cpu: true
                memory: true
                #disk: /

            - search:
                provider: duckduckgo
                target: _blank

          services.yaml: |
            ---
            # For configuration options and examples, please see:
            # https://gethomepage.dev/latest/configs/services
            #
            #
            - Community:
              - Cinny:
                href: https://app.cinny.in/login/${DOMAIN_0}
                description: Matrix client for voice and text chat
                icon: https://cinny.in/assets/favicon-16x16.png
                widget:
                  type: prometheusmetric
                  url: http://prometheus-operated.kube-prometheus-stack.svc.cluster.local:9090
                  refreshInterval: 10000 # optional - in milliseconds, defaults to 10s
                  metrics:
                    - label: Live Chatters
                      query: livekit_participant_total

          bookmarks.yaml: |
            ---
            # For configuration options and examples, please see:
            # https://gethomepage.dev/latest/configs/bookmarks

            - Bookmarks:
                - Cluster Repo:
                    - abbr: GH
                      href: https://github.com/mgale456/ClusterTesting
                      icon: https://github.githubassets.com/favicons/favicon-dark.svg
                - Jumprocks.tk:
                    - abbr: JR
                      href: https://jumprocks.tk
                      icon: https://jumprocks.tk/favicon.ico

            - TrueCharts:
                - TrueCharts:
                  - abbr: TC
                    icon: https://truecharts.org/svg/favicon.svg
                    href: https://truecharts.org/truetech/truecharts/charts/stable/frigate/
                    description: "TrueCharts Website"
                - TrueCharts Github:
                  - abbr: GH
                    icon: https://github.githubassets.com/favicons/favicon-dark.svg
                    href: https://github.com/trueforge-org/truecharts/tree/master/charts/stable
                    description: "TrueCharts GitHub"

    forceConfigFromValues: true

    rbac:
      main:
        rules:
          # customized
          - apiGroups:
              - "gateway.networking.k8s.io"
            resources:
              - httproutes
              - gateways
            verbs:
              - get
              - list
          # carried forward from chart
          - apiGroups:
              - ""
            resources:
              - namespaces
              - pods
              - nodes
            verbs:
              - get
              - list
          - apiGroups:
              - extensions
              - networking.k8s.io
            resources:
              - ingresses
            verbs:
              - get
              - list
          - apiGroups:
              - traefik.containo.us
              - traefik.io
            resources:
              - ingressroutes
            verbs:
              - get
              - list
          - apiGroups:
              - metrics.k8s.io
            resources:
              - nodes
              - pods
            verbs:
              - get
              - list
          - apiGroups:
              - apiextensions.k8s.io
            resources:
              - customresourcedefinitions/status
            verbs:
              - get

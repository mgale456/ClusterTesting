---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.8.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: ghcr.io/home-operations/home-assistant
      pullPolicy: IfNotPresent
      tag: "2026.6.3"
    service:
      main:
        type: LoadBalancer
        loadBalancerIP: ${HOME_ASSISTANT_IP}
        integrations:
          metallb:
            enabled: true
        ports:
          main:
            port: 8123
            targetPort: 8123
    route:
      main:
        enabled: true
        kind: HTTPRoute
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home Automation
          gethomepage.dev/href: https://home-assistant.${DOMAIN_0}/
          gethomepage.dev/icon: https://trueforge.org/img/hotlink-ok/chart-icons/home-assistant.webp
          gethomepage.dev/name: Home Assistant (k8s)
          gethomepage.dev/instance: "internal"
          gethomepage.dev/description: Smart Home Automation Platform
        parentRefs:
          - name: envoy-internal
            namespace: envoy
            sectionName: https
        hostnames:
          - home-assistant.${DOMAIN_0}
      cs:
        enabled: false
        kind: HTTPRoute
        parentRefs:
          - name: envoy-internal
            namespace: envoy
            sectionName: https

        hostnames:
          - cs-home-assistant.${DOMAIN_0}
        rules:
          - backendRefs:
              - group: ""
                kind: Service
                name:
                namespace:
                port:
                weight: 1
                ## Configure conditions used for matching incoming requests. Only for HTTPRoutes
                matches:
                  - path:
                      type: PathPrefix
                      value: /

    workload:
      main:
        podSpec:
          nodeSelector:
            feature.node.kubernetes.io/usb-ff_10c4_ea60.present: "true" # zigbee dongle
    persistence:
      config:
        enabled: true
        mountPath: /config
        targetSelector:
          main:
            main: {}
            codeserver:
              mountPath: /config/workspace
      venv-cache:
        enabled: true
        mountPath: /config/.venv
        targetSelectAll: true
    addons:
      codeserver:
        # -- Enable running a code-server container in the pod
        enabled: true

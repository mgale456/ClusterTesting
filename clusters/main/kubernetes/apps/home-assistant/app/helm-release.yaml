---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.6.8
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: ghcr.io/home-operations/home-assistant
      pullPolicy: IfNotPresent
      tag: "2026.6.1"
    service:
      main:
        type: LoadBalancer
        loadBalancerIP: ${HOME_ASSISTANT_IP}
        integrations:
          metallb:
            enabled: true
        ports:
          main:
            port: 8123
            targetPort: 8123
    route:
      main:
        enabled: true
        kind: HTTPRoute
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home Automation
          gethomepage.dev/href: https://home-assistant.${DOMAIN_0}/
          gethomepage.dev/icon: https://trueforge.org/img/hotlink-ok/chart-icons/home-assistant.webp
          gethomepage.dev/name: Home Assistant (k8s)
          gethomepage.dev/instance: "internal"
          gethomepage.dev/description: Smart Home Automation Platform
        parentRefs:
          - name: envoy-internal
            namespace: envoy
            sectionName: https
        hostnames:
          - home-assistant.${DOMAIN_0}

    persistence:
      config:
        enabled: true
        mountPath: /config
        targetSelector:
          main:
            main: {}
            codeserver:
              mountPath: /config/workspace
      venv-cache:
        enabled: true
        mountPath: /config/.venv
        targetSelectAll: true
    addons:
      codeserver:
        # -- Enable running a code-server container in the pod
        enabled: false

        ingress:
          # -- Enable an ingress for the code-server add-on.
          enabled: false
          ingressClassName: internal
          hosts:
            - host: cs-home-assistant.${INGRESS_URL}
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - cs-home-assistant.${INGRESS_URL}

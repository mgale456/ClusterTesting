apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: outline
  namespace: outline
spec:
  parentRefs:
    - name: envoy-internal
      namespace: envoy
      sectionName: https
  hostnames:
    - "outline.${INGRESS_URL}"
  rules:
    - backendRefs:
        - name: outline
          port: 10352

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hass-external-service
  namespace: hass-external-service
spec:
  interval: 15m
  chart:
    spec:
      chart: external-service
      version: 17.5.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    route:
      main:
        enabled: true
        kind: HTTPRoute
        parentRefs:
          - name: envoy-internal
            namespace: envoy
            sectionName: https
        hostnames:
          - hass.${DOMAIN_0}
        annotations:
          gatus.home-operations.com/enabled: false
    service:
      main:
        type: ExternalIP
        externalIP: "${HASS_EXTERNAL_IP}"
        useSlice: false
        ports:
          main:
            protocol: http
            port: 8123
            # Target port is the port of the "external service"
            # Defaults to "port" if not set
    workload:
      main:
        enabled: false
        podSpec:
          containers:
            main:
              env: {}

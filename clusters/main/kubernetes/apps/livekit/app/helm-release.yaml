---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: livekit
  namespace: livekit
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.6.7
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: ${TZ}
    podOptions:
      hostUsers: true
    image:
      repository: livekit/livekit-server
      tag: 1.11.0@sha256:100b9a870616d02f5e3795b34e0b593b5054a26f8131a94fd3fa322ed3154b16
    jwt-image:
      repository: ghcr.io/element-hq/lk-jwt-service
      tag: 0.5.0@sha256:29918567e6b7cd920e2853b4cd6848ce01b79947c3d19a9f1ed5b74f0a2a88bf
    workload:
      main:
        enabled: true
        primary: true
        type: Deployment
        replicas: 1
        podSpec:
          terminationGracePeriodSeconds: 1800 # 5 hours if folks are using it
          containers:
            main:
              #args: "--config /etc/livekit.yaml"
              enabled: true
              primary: true
              env:
                LIVEKIT_CONFIG: |
                  {{- .Values.livekit | toYaml }}
      jwt:
        enabled: true
        type: Deployment
        replicas: 1
        podSpec:
          containers:
            jwt:
              enabled: true
              primary: true
              imageSelector: jwt-image
              env:
                #LIVEKIT_JWT_BIND: 8081
                LIVEKIT_URL: wss://livekit.${INGRESS_URL}
                LIVEKIT_KEY: ${LK_MATRIX_KEY}
                LIVEKIT_SECRET: ${LK_MATRIX_SECRET}
                LIVEKIT_FULL_ACCESS_HOMESERVERS: "matrix.${INGRESS_URL},${INGRESS_URL}"
              probes:
                liveness: &probes
                  enabled: true
                  type: http
                  port: 8080
                  path: /healthz
                readiness: *probes
                startup: *probes

    service:
      main:
        enabled: true
        targetSelector: main
        ports:
          main:
            enabled: true
            protocol: http
            port: 80
            targetPort: 7880
          rtc-tcp:
            enabled: true
            port: 7881
          rtc-udp:
            enabled: true
            port: 50100
            protocol: udp
          rtc-udp1:
            enabled: true
            port: 50101
            protocol: udp
          rtc-udp2:
            enabled: true
            port: 50102
            protocol: udp
          rtc-ud3:
            enabled: true
            port: 50103
            protocol: udp
          rtc-udp4:
            enabled: true
            port: 50104
            protocol: udp
          rtc-udp5:
            enabled: true
            port: 50105
            protocol: udp
          rtc-udp6:
            enabled: true
            port: 50106
            protocol: udp
          rtc-udp7:
            enabled: true
            port: 50107
            protocol: udp
          rtc-udp8:
            enabled: true
            port: 50108
            protocol: udp
          rtc-udp9:
            enabled: true
            port: 50109
            protocol: udp
          rtc-udp10:
            enabled: true
            port: 50110
            protocol: udp
      metrics:
        enabled: true
        targetSelector: main
        ports:
          metrics:
            enabled: true
            port: 6789
      jwt:
        enabled: true
        targetSelector: jwt
        ports:
          jwt:
            enabled: true
            protocol: http
            port: 8080
    persistence:
      config-vol:
        enabled: true
        type: configmap
        mountPath: /etc/livekit.yaml
        subPath: livekit.yaml
        readOnly: true
        objectName: config-map
    configmap:
      config-map:
        enabled: true
        data:
          livekit.yaml: |
            {{- .Values.livekit | toYaml | nindent 2 }}

    metrics:
      metrics:
        enabled: true
        primary: true
        # options: servicemonitor, podmonitor
        type: "servicemonitor"
        # defaults to selectorLabels
        selector:
          matchLabels:
            app.kubernetes.io/instance: livekit
            app.kubernetes.io/name: app-template
            service.name: metrics
        endpoints:
          - port: metrics
            interval: 5s
            scrapeTimeout: 5s
            path: /metrics
    livekit:
      port: 7880
      bind_addresses:
        - ""
      rtc:
        tcp_port: 7881
        port_range_start: 50100
        port_range_end: 50200
        use_external_ip: false
        enable_loopback_candidate: false
        turn_servers:
          - host: turn.${INGRESS_URL}
            port: 3478
            protocol: tcp
            secret: "${LK_TURN_SECRET}"
          - host: turn.${INGRESS_URL}
            port: 5349
            protocol: tls # Only if you've set up TLS in your coturn
            secret: "${LK_TURN_SECRET}"
          - host: turn.${INGRESS_URL}
            port: 3478
            protocol: udp
            secret: "${LK_TURN_SECRET}"
      room:
        auto_create: false
      turn:
        enabled: false
      prometheus:
        port: 6789
      keys:
        ${LK_MATRIX_KEY}: "${LK_MATRIX_SECRET}"

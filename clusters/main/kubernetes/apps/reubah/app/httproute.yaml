apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: reubah
  namespace: reubah
  annotations:
    gethomepage.dev/enabled: true
    gethomepage.dev/group: Tools
    gethomepage.dev/name: Reubah
    gethomepage.dev/href: https://reubah.${INGRESS_URL}/
spec:
  parentRefs:
    - name: envoy-internal
      namespace: envoy
      sectionName: https
  hostnames:
    - "reubah.${INGRESS_URL}"
  rules:
    - backendRefs:
        - name: reubah
          port: 8081

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: piper
  namespace: piper
spec:
  interval: 15m
  chart:
    spec:
      chart: wyoming-piper
      version: 9.3.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: ${TZ}
    service:
      main:
        type: LoadBalancer
        loadBalancerIP: ${PIPER_IP}
        integrations:
          metallb:
            enabled: true
    route:
      main:
        enabled: true
        kind: HTTPRoute
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Tools
          gethomepage.dev/href: https://piper.${DOMAIN_0}/
          gethomepage.dev/icon: https://trueforge.org/img/hotlink-ok/chart-icons/piper.webp
          gethomepage.dev/name: Piper
          gethomepage.dev/instance: "internal"
          gethomepage.dev/description: Used for browser access to cameras
        parentRefs:
          - name: envoy-internal
            namespace: envoy
            sectionName: https
        hostnames:
          - piper.${DOMAIN_0}

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lldap
  namespace: lldap
spec:
  interval: 15m
  chart:
    spec:
      chart: lldap
      version: 9.3.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: ${TZ}
    credentials:
      mys3:
        type: s3
        url: "${S3URL}"
        bucket: "${S3BUCKETNAME}"
        accessKey: "${S3APIKEYID}"
        secretKey: "${S3APIKEY}"
        encrKey: "${S3KEY}"
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                LLDAP_LDAP_BASE_DN: "dc=${BASE_DN},dc=xyz"
                # ADMIN
                LLDAP_LDAP_USER_DN: "admin"
                LLDAP_LDAP_USER_PASS: "${LLDAP_ADMIN_PASS}"
    persistence:
      data:
        volsync:
          - name: b2
            type: restic
            cleanupCachePVC: true
            credentials: mys3
            dest:
              enabled: true
            src:
              enabled: true
    cnpg:
      main:
        mode: recovery
        backups:
          enabled: true
          revision: "2"
          credentials: mys3
        recovery:
          revision: "2"
          credentials: mys3
    ingress:
      main:
        enabled: true
        ingressClassName: internal
        annotations:
          gethomepage.dev/instance: "internal"
        hosts:
          - host: lldap.${INGRESS_URL}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - lldap.${INGRESS_URL}
        integrations:
          homepage:
            enabled: true
            group: Default
            widget:
              enabled: false
    route:
      main:
        enabled: true
        # Valid options are GRPCRoute, HTTPRoute, TCPRoute, TLSRoute, UDPRoute
        kind: HTTPRoute
        annotations:
          gethomepage.dev/enabled: true
          gethomepage.dev/group: Default
          gethomepage.dev/href: https://lldap.${DOMAIN_0}/
          gethomepage.dev/icon: https://trueforge.org/img/hotlink-ok/chart-icons/lldap.webp
          gethomepage.dev/name: lldap
          gethomepage.dev/instance: "internal"
          gethomepage.dev/description: Lightweight ldap server for authentication and user management
        # -- Configure the resource the route attaches to.
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: envoy-internal
            namespace: envoy
            sectionName: https
        hostnames:
          - https://lldap.${DOMAIN_0}/
        # -- Configure rules for routing. Defaults to the primary service.
        rules:
          - backendRefs:
              - group: ""
                #kind: Service
                name: lldap
                #namespace:
                port: 17170

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
  namespace: gatus
spec:
  interval: 15m
  chart:
    spec:
      chart: gatus
      version: 4.10.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: ${TZ}
    workload:
      main:
        replicas: 1
    cnpg:
      main:
        enabled: false

    sidecar:
      enable: true
      enableIngress: true
      autoIngress: true
      enableHttproute: true
      autoHttproute: true
    persistence:
      configmain:
        type: emptyDir

    configmap:
      config:
        enabled: true
        data:
          config.yaml: |
            endpoints:
              - name: K8s Blocky DNS
                group: DNS
                url: ${BLOCKY_IP}
                interval: 300s
                dns:
                  query-name: google.com
                  query-type: "A"
                conditions:
                  - "[DNS_RCODE] == NOERROR"
              - name: RPi3 Blocky DNS
                group: DNS
                url: ${HASS_EXTERNAL_IP}
                interval: 300s
                dns:
                  query-name: google.com
                  query-type: "A"
                conditions:
                  - "[DNS_RCODE] == NOERROR"
              - name: TrueNAS Scale
                group: Other
                url: http://${TRUENAS_EXTERNAL_IP}:81
                interval: 300s
                conditions:
                  - "[STATUS] == 200"

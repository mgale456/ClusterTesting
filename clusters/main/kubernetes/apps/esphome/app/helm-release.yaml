apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: esphome
  namespace: esphome
spec:
  interval: 15m
  chart:
    spec:
      chart: esphome
      version: 25.8.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: ${TZ}
    workload:
      main:
        replicas: 1
        podSpec:
          containers:
            main:
              env:
                ESPHOME_DASHBOARD_USE_PING: true
    credentials:
      mys3:
        type: s3
        url: "https://${S3URL}"
        bucket: "${S3BUCKETNAME}"
        #path: "/esphome"
        accessKey: "${S3APIKEYID}"
        secretKey: "${S3APIKEY}"
        encrKey: "${S3KEY}"
    persistence:
      config:
        volsync:
          - name: b2
            type: restic
            credentials: mys3
            dest:
              enabled: true
            src:
              enabled: true
      cache: #caches platformio packages to prevent excess downloads. https://github.com/esphome/esphome/blob/dev/docker/docker_entrypoint.sh
        enabled: true
        mountPath: /cache
      build: #caches compiled code to not require rebuilds on restart
        enabled: true
        mountPath: /build
        type: emptyDir
      platformio:
        enabled: false
    resources:
      limits:
        cpu: 4000m
        memory: 8Gi
      requests:
        cpu: 10m
        memory: 50Mi

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: REPLACEME
  namespace: REPLACEME
spec:
  interval: 15m
  chart:
    spec:
      chart: REPLACEME
      version: XX.XX.XX
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    service:
      main:
        type: LoadBalancer
        loadBalancerIP: ${XXXXX_IP}
        integrations:
          metallb:
            enabled: true
    route:
      main:
        enabled: true
        kind: HTTPRoute
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Default
          gethomepage.dev/href: https://REPLACEME.${DOMAIN_0}/
          gethomepage.dev/icon: https://trueforge.org/img/hotlink-ok/chart-icons/REPLACEME.webp
          gethomepage.dev/name: REPLACEME
          gethomepage.dev/instance: "internal"
          gethomepage.dev/description: REPLACEME
        parentRefs:
          - name: envoy-internal
            namespace: envoy
            sectionName: https
        hostnames:
          - REPLACEME.${DOMAIN_0}
